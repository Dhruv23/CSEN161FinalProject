<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cosmo Guide</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <div class="image-section">
            <div class="image-overlay">
                <h2>Explore the Universe</h2>
            </div>
        </div>

        <div class="form-section">
            <div class="form-wrapper">
                <h1>Welcome Back!</h1>
                <p class="subtitle">log in to continue your journey.</p>

                <div id="error-message" class="error-hidden"></div>

                <form id="login-form" action="login.php" method="POST">
                    <div class="input-group">
                        <label for="email">email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="#" id="forgot-pass-link" class="forgot-pass">forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-primary">LOG IN</button>
                </form>
            </div>
        </div>
    </div>

    <div id="reset-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Reset Password</h2>
            <p class="modal-subtitle">Enter your email and choose a new password.</p>

            <div id="reset-error" class="error-hidden"></div>
            <div id="reset-success" class="success-hidden"></div>

            <form id="reset-form">
                <div class="input-group">
                    <label for="reset-email">email</label>
                    <input type="email" id="reset-email" name="email" required>
                </div>

                <div class="input-group">
                    <label for="reset-password">New Password</label>
                    <input type="password" id="reset-password" name="password" required>
                </div>

                <div class="input-group">
                    <label for="reset-confirm-password">Confirm Password</label>
                    <input type="password" id="reset-confirm-password" name="confirm_password" required>
                </div>

                <div class="modal-actions">
                    <button type="button" id="reset-cancel" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
